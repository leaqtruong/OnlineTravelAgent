name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/online_travel_agent?schema=public
      JWT_SECRET: ci-jwt-secret
      ADMIN_PASSWORD: ci-admin-password
      CORS_ORIGINS: http://localhost:3000
      TRUST_PROXY: "false"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci
      - run: npm run db:generate
      - run: npm run db:validate
      - run: npm run build
      - run: npm test
      - run: npm audit --audit-level=high
      - run: docker build -t online-travel-agent-backend:ci .

  flutter:
    name: Flutter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.0"
          channel: stable
          cache: true

      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test
