name: online_travel_agent
description: A new Flutter project.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.10.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_secure_storage: ^9.2.2
  http: ^1.2.2
  flutter_map: ^8.3.0
  latlong2: ^0.9.1
  intl: ^0.20.2
  flutter_riverpod: ^3.3.1
  google_fonts: ^8.1.0
  flutter_staggered_animations: ^1.1.1
  shimmer: ^3.0.0
  animated_text_kit: ^4.3.0
  path_drawing: ^1.0.1
  url_launcher: ^6.3.1
  qr_flutter: ^4.1.0
  cached_network_image: ^3.4.1
  socket_io_client: ^3.1.6
  drift: ^2.24.0
  sqlite3_flutter_libs: ^0.5.0
  path_provider: ^2.1.0
  path: ^1.9.0
  connectivity_plus: ^6.0.0
  easy_localization: ^3.0.8
  uuid: ^4.5.3
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.24.0
  build_runner: ^2.4.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.5
  shared_preferences: ^2.5.5

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#176FF2"
  adaptive_icon_foreground: "assets/images/app_icon.png"

flutter_native_splash:
  color: "#176FF2"
  image: assets/images/app_icon.png
  color_dark: "#0D1B2A"
  image_dark: assets/images/app_icon.png
  android_12:
    color: "#176FF2"
    image: assets/images/app_icon.png
    color_dark: "#0D1B2A"
    image_dark: assets/images/app_icon.png
  android: true
  ios: true

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/translations/
